name: pre-commit

on:
  pull_request:
  push:
    branches:
      - main
      - master

env:
  HELM_VERSION: "3.21.1"
  HELM_DOCS_VERSION: "1.14.2"
  HELM_VALUES_SCHEMA_JSON_VERSION: "2.5.0"

jobs:
  pre-commit:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Set up Python environment
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      - name: Install helm-docs
        uses: giantswarm/install-binary-action@5bef88f65012037dd836117c8d344b21bb559854 # v4.1.0
        with:
          binary: helm-docs
          version: "${{ env.HELM_DOCS_VERSION }}"
          download_url: "https://github.com/norwoodj/helm-docs/releases/download/v${version}/helm-docs_${version}_Linux_x86_64.tar.gz"
          tarball_binary_path: "helm-docs"
          smoke_test: "${binary} --version"
      - name: Cache schema plugin
        id: cache-schema
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /home/runner/.local/share/helm/plugins/helm-values-schema-json
          key: ${{ runner.os }}-${{ env.HELM_VALUES_SCHEMA_JSON_VERSION }}-schema
      - name: Install helm-values-schema-json
        if: steps.cache-schema.outputs.cache-hit != 'true'
        run: |
          helm plugin install https://github.com/losisin/helm-values-schema-json \
            --version $HELM_VALUES_SCHEMA_JSON_VERSION
      - name: Execute pre-commit hooks
        uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1
        env:
          GOGC: "20"
